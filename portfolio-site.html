<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mara Ellis — Designer</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }

  :root {
    --void: #0c0b09;
    --void-2: #141310;
    --void-3: #1c1a17;
    --cream: #e8e0d0;
    --cream-2: #d4cabb;
    --cream-muted: rgba(232,224,208,0.55);
    --gold: #c8a574;
    --gold-glow: rgba(200,165,116,0.15);
    --rule: rgba(232,224,208,0.08);
    --rule-strong: rgba(232,224,208,0.15);
    --ff-display: 'Syne', sans-serif;
    --ff-serif: 'Cormorant Garamond', serif;
    --ff-body: 'DM Sans', sans-serif;
    --ff-mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--void);
    color: var(--cream);
    font-family: var(--ff-body);
    -webkit-font-smoothing: antialiased;
    cursor: none;
    overflow-x: hidden;
  }
  a { color: inherit; }

  /* ───── film grain overlay ───── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 9998;
  }

  /* ───── ambient orb ───── */
  .ambient-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
    filter: blur(80px);
    transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* density tokens */
  [data-density="loose"]  { --pad-x: 10vw;  --pad-y: 140px; --gap: 120px; }
  [data-density="cozy"]   { --pad-x: 7vw;   --pad-y: 100px; --gap: 80px; }
  [data-density="tight"]  { --pad-x: 4.5vw; --pad-y: 72px;  --gap: 56px; }

  /* ───── magnetic cursor ───── */
  .pf-cursor {
    position: fixed; top: 0; left: 0;
    width: 12px; height: 12px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    background: transparent;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.35s cubic-bezier(0.2,0.8,0.2,1),
                height 0.35s cubic-bezier(0.2,0.8,0.2,1),
                background 0.35s ease,
                border-color 0.35s ease;
    z-index: 9999;
    mix-blend-mode: difference;
  }
  .pf-cursor::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 1;
    transition: opacity 0.35s ease;
  }
  .pf-cursor.hover {
    width: 64px; height: 64px;
    border-color: var(--cream);
    background: rgba(232,224,208,0.06);
  }
  .pf-cursor.hover::after { opacity: 0; }
  @media (hover: none) { .pf-cursor { display: none; } body { cursor: auto; } }

  /* ───── reveals (slower, more cinematic) ───── */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1.2s cubic-bezier(.16,1,.3,1),
                transform 1.2s cubic-bezier(.16,1,.3,1);
  }
  .reveal.in { opacity: 1; transform: none; }

  /* ───── layout ───── */
  .pf {
    width: 100%;
    max-width: 1560px;
    margin: 0 auto;
    padding: var(--pad-y) var(--pad-x);
    position: relative;
    z-index: 1;
  }

  /* ───── top nav ───── */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
  }
  .top .mark {
    font-family: var(--ff-display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .top .nav-links {
    display: flex;
    gap: 40px;
  }
  .top .nav-links a {
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--cream-muted);
    transition: color 0.3s ease;
  }
  .top .nav-links a:hover { color: var(--gold); }
  .top .status {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--ff-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cream-muted);
  }
  .top .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(200,165,116,0.3);
    animation: glow 2.8s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(200,165,116,0.3); }
    50% { box-shadow: 0 0 20px var(--gold), 0 0 40px rgba(200,165,116,0.5); }
  }

  /* ───── hero ───── */
  .hero {
    margin-top: 120px;
    position: relative;
  }
  .hero .row {
    font-family: var(--ff-display);
    font-weight: 700;
    font-size: clamp(64px, 13vw, 180px);
    line-height: 0.92;
    letter-spacing: -0.04em;
    display: flex;
    align-items: baseline;
    gap: 0.15em;
    flex-wrap: wrap;
    margin: 0;
  }
  .hero .row + .row { margin-top: 0.02em; }
  .hero .r2 { justify-content: flex-end; }
  .hero .r4 { justify-content: flex-end; }
  .hero em {
    font-family: var(--ff-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }
  .hero .ampshape {
    width: 0.5em; height: 0.5em;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, #8a6b3d 100%);
    display: inline-block;
    vertical-align: middle;
    transform: translateY(-0.12em);
    flex-shrink: 0;
    box-shadow: 0 0 40px rgba(200,165,116,0.4);
  }
  .hero .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(11px, 1vw, 14px);
    font-family: var(--ff-mono);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.7em 1.4em;
    border: 1px solid var(--rule-strong);
    border-radius: 100px;
    transform: translateY(-0.35em);
    white-space: nowrap;
    color: var(--cream-muted);
    transition: border-color 0.3s ease, color 0.3s ease;
  }
  .hero .pill:hover { border-color: var(--gold); color: var(--cream); }
  .hero .pill .sep {
    width: 4px; height: 4px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.6;
  }

  /* ───── lede ───── */
  .lede {
    margin-top: 160px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    border-top: 1px solid var(--rule);
    padding-top: 60px;
  }
  .lede .lbl {
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 24px;
  }
  .lede p {
    font-size: clamp(17px, 1.5vw, 21px);
    line-height: 1.6;
    margin: 0;
    color: var(--cream-2);
    font-weight: 300;
    letter-spacing: -0.005em;
    max-width: 520px;
  }
  .lede p em {
    font-family: var(--ff-serif);
    font-style: italic;
    color: var(--cream);
    font-size: 1.05em;
  }

  /* ───── work ───── */
  .work-head {
    margin-top: 240px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 32px;
  }
  .work-head .l {
    font-family: var(--ff-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--cream-muted);
  }
  .work-head h2 {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: clamp(36px, 4.5vw, 56px);
    letter-spacing: -0.03em;
    margin: 0;
  }
  .work-head h2 em {
    font-family: var(--ff-serif);
    font-style: italic;
    color: var(--gold);
  }

  .work-grid {
    margin-top: 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px var(--gap);
  }
  .proj {
    display: flex;
    flex-direction: column;
    gap: 24px;
    text-decoration: none;
    color: inherit;
  }
  .proj.featured { grid-column: 1 / -1; }
  .proj .thumb {
    aspect-ratio: 16 / 10;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    transition: transform 0.8s cubic-bezier(.16,1,.3,1);
  }
  .proj.featured .thumb { aspect-ratio: 21 / 9; }
  .proj:hover .thumb { transform: scale(1.015); }
  .proj .thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(232,224,208,0.06);
    border-radius: 4px;
    pointer-events: none;
  }
  .proj .meta {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 32px;
    align-items: baseline;
  }
  .proj .meta .name {
    font-family: var(--ff-display);
    font-size: clamp(20px, 2vw, 28px);
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .proj .meta .name em {
    font-family: var(--ff-serif);
    font-style: italic;
    color: var(--gold);
  }
  .proj .meta .yr, .proj .meta .tag {
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--cream-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* rich gradient placeholders */
  .grad-1 {
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(200,165,116,0.35) 0%, transparent 50%),
      radial-gradient(ellipse 60% 80% at 80% 70%, rgba(140,100,60,0.3) 0%, transparent 50%),
      linear-gradient(135deg, #1c1a17 0%, #0c0b09 50%, #1a1612 100%);
  }
  .grad-2 {
    background:
      radial-gradient(circle at 70% 30%, rgba(200,165,116,0.5) 0%, transparent 40%),
      radial-gradient(circle at 30% 80%, rgba(100,80,50,0.4) 0%, transparent 40%),
      linear-gradient(180deg, #141310 0%, #0c0b09 100%);
  }
  .grad-3 {
    background:
      conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(200,165,116,0.15) 120deg, transparent 240deg),
      radial-gradient(ellipse at center, #1c1a17 0%, #0c0b09 100%);
  }
  .grad-4 {
    background:
      radial-gradient(ellipse 100% 50% at 50% 0%, rgba(200,165,116,0.25) 0%, transparent 60%),
      linear-gradient(0deg, #0c0b09 0%, #141310 50%, #0c0b09 100%);
  }

  /* ───── about ───── */
  .about {
    margin-top: 280px;
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: var(--gap);
  }
  .about .lbl {
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding-top: 0.3em;
  }
  .about .body {
    font-family: var(--ff-display);
    font-size: clamp(26px, 3vw, 44px);
    line-height: 1.25;
    letter-spacing: -0.02em;
    font-weight: 400;
    margin: 0;
    max-width: 900px;
  }
  .about .body em {
    font-family: var(--ff-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }

  /* ───── experience ───── */
  .exp { margin-top: 200px; }
  .exp-head {
    font-family: var(--ff-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--cream-muted);
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 100px 1fr 1fr 180px;
    gap: 32px;
  }
  .exp-row {
    display: grid;
    grid-template-columns: 100px 1fr 1fr 180px;
    gap: 32px;
    padding: 36px 0;
    border-bottom: 1px solid var(--rule);
    align-items: baseline;
    transition: background 0.3s ease;
  }
  .exp-row:hover { background: rgba(200,165,116,0.02); }
  .exp-row .yr {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--cream-muted);
    letter-spacing: 0.02em;
  }
  .exp-row .place {
    font-family: var(--ff-display);
    font-size: clamp(17px, 1.5vw, 21px);
    letter-spacing: -0.01em;
    font-weight: 500;
  }
  .exp-row .role {
    color: var(--cream-2);
    font-size: 14px;
    font-weight: 300;
  }
  .exp-row .loc {
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--cream-muted);
    text-align: right;
    letter-spacing: 0.04em;
  }

  /* ───── footer ───── */
  .footer {
    margin-top: 280px;
    padding: 140px 0 0;
    border-top: 1px solid var(--rule);
    position: relative;
  }
  .footer .big {
    font-family: var(--ff-display);
    font-size: clamp(80px, 12vw, 160px);
    line-height: 0.95;
    letter-spacing: -0.04em;
    font-weight: 700;
    margin: 0;
    text-align: center;
  }
  .footer .big em {
    font-family: var(--ff-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }
  .footer .email-row {
    margin-top: 72px;
    text-align: center;
    font-size: clamp(18px, 2vw, 28px);
    font-weight: 300;
    letter-spacing: -0.01em;
  }
  .footer .email-row a {
    text-decoration: none;
    position: relative;
    display: inline-block;
  }
  .footer .email-row a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.4s cubic-bezier(.16,1,.3,1);
  }
  .footer .email-row a:hover::after {
    transform: scaleX(1);
    transform-origin: left;
  }
  .footer .row {
    margin-top: 160px;
    padding: 32px 0;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--cream-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-wrap: wrap;
    gap: 20px;
  }

  @media (max-width: 900px) {
    .top .nav-links { display: none; }
    .lede, .about { grid-template-columns: 1fr; }
    .about .lbl { margin-bottom: 16px; }
    .work-grid { grid-template-columns: 1fr; }
    .exp-head, .exp-row {
      grid-template-columns: 70px 1fr 1fr;
      gap: 16px;
    }
    .exp-head > :last-child, .exp-row .loc { display: none; }
    .hero .pill { transform: none; margin-top: 8px; }
  }

  @media (max-width: 600px) {
    .hero .row { font-size: clamp(48px, 14vw, 72px); }
    .exp-head, .exp-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .exp-head { display: none; }
    .exp-row .yr { order: 3; margin-top: 4px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="ambient-orb" id="ambientOrb"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Content ────────────────────────────────────────────────────
const PROJECTS = [
  { n: '01', name: 'Cadence', desc: 'Brand identity and product design for a habit-tracking journal app.', tags: ['Identity','Product','Motion'], year: '2025', grad: 'grad-1' },
  { n: '02', name: 'Northbound', desc: 'Editorial site for a literary magazine with custom display type.', tags: ['Editorial','Web'], year: '2024', grad: 'grad-2' },
  { n: '03', name: 'Lumen Studio', desc: 'Visual identity for an architecture practice.', tags: ['Identity','Print'], year: '2024', grad: 'grad-3' },
  { n: '04', name: 'Field Notes', desc: 'A weekly newsletter on craft, materials, and process.', tags: ['Editorial','Brand'], year: '2023', grad: 'grad-4' },
];

const EXPERIENCE = [
  { yr: '2024 —', place: 'Independent', role: 'Brand & Product Design', loc: 'Brooklyn, NY' },
  { yr: '2021 — 24', place: 'Field Studio', role: 'Senior Designer', loc: 'New York, NY' },
  { yr: '2018 — 21', place: 'Hover & Co.', role: 'Designer', loc: 'Brooklyn, NY' },
  { yr: '2016 — 18', place: 'RISD', role: 'BFA, Graphic Design', loc: 'Providence, RI' },
];

// ── Hooks ─────────────────────────────────────────────────────
function useCursor() {
  useEffect(() => {
    const cursor = document.createElement('div');
    cursor.className = 'pf-cursor';
    cursor.style.opacity = '0';
    document.body.appendChild(cursor);

    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    const onMove = (e) => {
      cursor.style.opacity = '1';
      mouseX = e.clientX;
      mouseY = e.clientY;
    };

    const animate = () => {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      requestAnimationFrame(animate);
    };
    animate();

    const onOver = (e) => {
      const t = e.target;
      if (t.closest && t.closest('a, .proj, button, input, .pill')) {
        cursor.classList.add('hover');
      } else {
        cursor.classList.remove('hover');
      }
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseover', onOver);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseover', onOver);
      cursor.remove();
    };
  }, []);
}

function useAmbientOrb() {
  useEffect(() => {
    const orb = document.getElementById('ambientOrb');
    if (!orb) return;

    let scrollY = 0;
    let targetY = 0;

    const onScroll = () => {
      scrollY = window.scrollY;
    };

    const animate = () => {
      targetY += (scrollY - targetY) * 0.05;
      const vh = window.innerHeight;
      orb.style.transform = `translate(-50%, ${targetY * 0.3}px)`;
      orb.style.left = '70%';
      orb.style.top = `${vh * 0.3}px`;
      requestAnimationFrame(animate);
    };
    animate();

    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
}

function useReveals() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((en) => {
        if (en.isIntersecting) {
          en.target.classList.add('in');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function useParallax() {
  useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        document.querySelectorAll('[data-parallax]').forEach((el) => {
          const r = el.getBoundingClientRect();
          const vh = window.innerHeight || 800;
          const speed = parseFloat(el.dataset.parallax) || 0.03;
          const offset = (r.top + r.height / 2 - vh / 2) * speed;
          el.style.transform = `translateY(${offset.toFixed(2)}px)`;
        });
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
}

// ── Site ──────────────────────────────────────────────────────
function Site() {
  useCursor();
  useAmbientOrb();
  useReveals();
  useParallax();

  return (
    <main className="pf" data-density="cozy">

      <header className="top reveal">
        <div className="mark">Mara Ellis</div>
        <nav className="nav-links">
          <a href="#work">Work</a>
          <a href="#about">About</a>
          <a href="#contact">Contact</a>
        </nav>
        <div className="status">
          <span className="dot" />
          Available Q3 '25
        </div>
      </header>

      <section className="hero">
        <div className="row r1 reveal">Designer<span className="ampshape" /></div>
        <div className="row r2 reveal" style={{ transitionDelay: '120ms' }}>of <em>quiet</em>,</div>
        <div className="row r3 reveal" style={{ transitionDelay: '240ms' }}>
          considered
          <span className="pill">
            brand<span className="sep" />editorial<span className="sep" />product
          </span>
        </div>
        <div className="row r4 reveal" style={{ transitionDelay: '360ms' }}>
          <em>systems.</em>
        </div>
      </section>

      <div className="lede">
        <div className="reveal">
          <div className="lbl">The Practice</div>
          <p>
            A small studio of one, working between <em>brand</em>, <em>editorial</em>, and <em>product</em>. I help founders and creative teams craft careful, considered work that earns a second look.
          </p>
        </div>
        <div className="reveal" style={{ transitionDelay: '120ms' }}>
          <div className="lbl">Currently</div>
          <p>
            Building identity systems for two early-stage companies and finishing a printed monograph for an architecture studio. Open to projects starting in Q3.
          </p>
        </div>
      </div>

      <div className="work-head">
        <span className="l reveal">Selected · 04 of 12</span>
        <h2 className="reveal" id="work">Recent <em>work.</em></h2>
      </div>

      <section className="work-grid">
        {PROJECTS.map((p, i) => (
          <a key={p.n} href="#" className={`proj reveal ${i === 0 ? 'featured' : ''}`} style={{ transitionDelay: `${i * 80}ms` }}>
            <div className={`thumb ${p.grad}`} data-parallax={i % 2 ? '-0.025' : '0.025'} />
            <div className="meta">
              <span className="name">
                {p.name.split(' ').map((w, j) => j === 1 ? <em key={j}>{w} </em> : w + ' ')}
              </span>
              <span className="tag">{p.tags[0]}</span>
              <span className="yr">{p.year}</span>
            </div>
          </a>
        ))}
      </section>

      <section className="about" id="about">
        <div className="lbl reveal">About</div>
        <p className="body reveal">
          I'm a designer based in Brooklyn working at the edge of brand, editorial, and product. Previously at <em>Field Studio</em> and <em>Hover & Co.</em> Now independent, by <em>appointment</em>.
        </p>
      </section>

      <section className="exp">
        <div className="exp-head reveal">
          <span>Year</span>
          <span>Place</span>
          <span>Role</span>
          <span style={{ textAlign: 'right' }}>Location</span>
        </div>
        {EXPERIENCE.map((e, i) => (
          <div key={i} className="exp-row reveal" style={{ transitionDelay: `${i * 50}ms` }}>
            <span className="yr">{e.yr}</span>
            <span className="place">{e.place}</span>
            <span className="role">{e.role}</span>
            <span className="loc">{e.loc}</span>
          </div>
        ))}
      </section>

      <footer className="footer" id="contact">
        <h2 className="big reveal">Let's <em>talk.</em></h2>
        <div className="email-row reveal" style={{ transitionDelay: '120ms' }}>
          <a href="mailto:hello@maraellis.studio">hello@maraellis.studio</a>
        </div>
        <div className="row reveal">
          <span>© 2025 Mara Ellis</span>
          <span>Brooklyn, NY · 40.6782° N</span>
          <span>Available · Q3 2025</span>
        </div>
      </footer>
    </main>
  );
}

function App() {
  return <Site />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
